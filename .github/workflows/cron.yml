name: YouTube Bot

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install feedparser requests

      - name: Run bot
        run: python bot.py

      - name: Commit state
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add state.json
          git commit -m "update" || exit 0
          git push
